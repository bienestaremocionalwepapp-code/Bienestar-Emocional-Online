<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formularios Pendientes — Bienestar Emocional</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rosa:   #FF85C0;
  --morado: #A67FFF;
  --rp:     #FFF0F7;
  --mp:     #F0EAFF;
  --bg:     #F8F5FF;
  --card:   #FFFFFF;
  --border: #E8DFFF;
  --text:   #1E1830;
  --mid:    #6B5F85;
  --ok:     #22C55E;
  --warn:   #F59E0B;
  --err:    #EF4444;
  --blue:   #3B82F6;
  --mono:   'DM Mono', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── LOGIN ── */
#login {
  position:fixed; inset:0; z-index:9999;
  background:#0F0A1E;
  display:flex; align-items:center; justify-content:center;
}
#login.gone { display:none; }
.ln-blobs { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.ln-blob {
  position:absolute; border-radius:50%; filter:blur(100px); opacity:.18;
  animation:drift 15s ease-in-out infinite alternate;
}
.ln-blob:nth-child(1){ width:600px;height:600px;background:#A67FFF;top:-150px;left:-200px;animation-duration:13s; }
.ln-blob:nth-child(2){ width:450px;height:450px;background:#FF85C0;bottom:-100px;right:-150px;animation-duration:17s;animation-delay:-6s; }
@keyframes drift{ to{ transform:translate(80px,100px); } }

.ln-card {
  position:relative; z-index:2;
  width:380px; max-width:92vw;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:28px; padding:2.6rem 2.2rem;
  backdrop-filter:blur(30px);
  box-shadow:0 40px 80px rgba(0,0,0,.55);
  animation:up .45s cubic-bezier(.16,1,.3,1);
}
@keyframes up{ from{opacity:0;transform:translateY(36px);} to{opacity:1;transform:none;} }

.ln-logo {
  width:60px; height:60px; border-radius:16px; margin:0 auto 1rem;
  background:linear-gradient(135deg,var(--rosa),var(--morado));
  display:flex; align-items:center; justify-content:center; font-size:1.8rem;
  box-shadow:0 10px 32px rgba(166,127,255,.5);
  animation:glow 3s ease-in-out infinite;
}
@keyframes glow{ 0%,100%{box-shadow:0 10px 32px rgba(166,127,255,.5);} 50%{box-shadow:0 10px 56px rgba(166,127,255,.9);} }

.ln-title { font-family:'Fraunces',serif; font-size:1.45rem; font-weight:900; color:#fff; text-align:center; letter-spacing:-.02em; }
.ln-sub   { font-size:.78rem; color:rgba(255,255,255,.3); text-align:center; margin:.3rem 0 2rem; }

.ln-field { margin-bottom:.95rem; }
.ln-label { display:block; font-size:.65rem; font-weight:700; color:rgba(255,255,255,.35); text-transform:uppercase; letter-spacing:.12em; margin-bottom:.38rem; }
.ln-inp-w { position:relative; }
.ln-ico   { position:absolute; left:.9rem; top:50%; transform:translateY(-50%); font-size:.9rem; opacity:.35; pointer-events:none; }
.ln-inp {
  width:100%; padding:.8rem 1rem .8rem 2.5rem;
  background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.1);
  border-radius:11px; font-family:'DM Sans',sans-serif; font-size:.93rem; color:#fff; outline:none; transition:all .2s;
}
.ln-inp::placeholder{ color:rgba(255,255,255,.2); }
.ln-inp:focus{ border-color:var(--morado); background:rgba(166,127,255,.12); box-shadow:0 0 0 3px rgba(166,127,255,.18); }
.ln-inp.bad{ border-color:var(--err); animation:shake .35s; }
@keyframes shake{ 0%,100%{transform:none} 25%,75%{transform:translateX(-5px)} 50%{transform:translateX(5px)} }
.ln-eye{ position:absolute; right:.85rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:.9rem; color:rgba(255,255,255,.25); transition:color .2s; }
.ln-eye:hover{ color:rgba(255,255,255,.7); }

.ln-btn {
  width:100%; margin-top:.3rem; padding:.92rem;
  background:linear-gradient(135deg,var(--rosa),var(--morado));
  border:none; border-radius:12px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:.96rem; font-weight:700;
  cursor:pointer; box-shadow:0 6px 22px rgba(166,127,255,.45); transition:all .22s;
}
.ln-btn:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 10px 32px rgba(166,127,255,.65); }
.ln-btn:disabled{ opacity:.5; cursor:not-allowed; }

.ln-err {
  background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.28);
  border-radius:10px; padding:.6rem .9rem; font-size:.8rem; color:#fca5a5;
  margin-top:.8rem; display:none;
}
.ln-err.show{ display:block; animation:shake .35s; }

/* ── APP ── */
#app { display:none; flex-direction:column; min-height:100vh; }
#app.on{ display:flex; }

/* topbar */
.topbar {
  background:var(--card); border-bottom:1px solid var(--border);
  padding:.85rem 1.6rem; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100; box-shadow:0 2px 14px rgba(166,127,255,.07);
}
.tb-l{ display:flex; align-items:center; gap:.8rem; }
.tb-dot{ width:36px; height:36px; border-radius:11px; background:linear-gradient(135deg,var(--rosa),var(--morado)); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.tb-title{ font-family:'Fraunces',serif; font-size:1rem; font-weight:900; letter-spacing:-.02em; }
.tb-title span{ color:var(--morado); }
.tb-r{ display:flex; align-items:center; gap:.55rem; }
.tb-chip{ display:flex; align-items:center; gap:.45rem; background:var(--bg); border:1px solid var(--border); border-radius:50px; padding:.28rem .85rem .28rem .38rem; }
.tb-av{ width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--rosa),var(--morado)); display:flex; align-items:center; justify-content:center; color:#fff; font-size:.75rem; font-weight:700; flex-shrink:0; }
.tb-uname{ font-size:.82rem; font-weight:600; }

/* main */
.main{ flex:1; padding:1.5rem; max-width:1300px; margin:0 auto; width:100%; }

/* header section */
.sec-header{
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:1rem; margin-bottom:1.3rem;
}
.sec-title{ font-family:'Fraunces',serif; font-size:1.55rem; font-weight:900; letter-spacing:-.02em; }
.sec-title span{ color:var(--morado); }

/* contadores */
.counters{ display:flex; gap:.5rem; flex-wrap:wrap; }
.counter{
  display:flex; align-items:center; gap:.4rem;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:50px; padding:.3rem .9rem; font-size:.78rem; font-weight:700;
  cursor:pointer; transition:all .18s;
}
.counter:hover{ border-color:var(--morado); color:var(--morado); }
.counter.on{ background:linear-gradient(135deg,var(--rosa),var(--morado)); color:#fff; border-color:transparent; }
.counter .n{ font-family:'Fraunces',serif; font-size:1rem; font-weight:900; }

/* toolbar */
.toolbar{ display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; margin-bottom:1.1rem; }
.srch-w{ flex:1; min-width:180px; position:relative; }
.srch-w input{
  width:100%; padding:.62rem 1rem .62rem 2.4rem;
  border:1.5px solid var(--border); border-radius:50px;
  font-family:'DM Sans',sans-serif; font-size:.87rem; background:#fff; color:var(--text); outline:none; transition:all .2s;
}
.srch-w input:focus{ border-color:var(--morado); box-shadow:0 0 0 3px rgba(166,127,255,.1); }
.srch-ico{ position:absolute; left:.82rem; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none; font-size:.9rem; }

/* tipo filtros */
.tipo-tabs{ display:flex; gap:.4rem; }
.tipo-tab{
  padding:.35rem .9rem; border-radius:50px; border:1.5px solid var(--border);
  background:var(--card); font-family:'DM Sans',sans-serif; font-size:.77rem; font-weight:600; color:var(--mid);
  cursor:pointer; transition:all .18s;
}
.tipo-tab.on{ background:var(--mp); color:var(--morado); border-color:var(--morado); }
.tipo-tab:hover{ border-color:var(--morado); color:var(--morado); }

/* btns */
.btn{
  display:inline-flex; align-items:center; gap:.4rem;
  padding:.58rem 1.15rem; border-radius:50px;
  font-family:'DM Sans',sans-serif; font-size:.83rem; font-weight:600;
  cursor:pointer; border:none; transition:all .2s; white-space:nowrap;
}
.btn-primary{ background:linear-gradient(135deg,var(--rosa),var(--morado)); color:#fff; box-shadow:0 4px 14px rgba(166,127,255,.35); }
.btn-primary:hover{ transform:translateY(-1px); box-shadow:0 6px 22px rgba(166,127,255,.5); }
.btn-primary:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.btn-ghost{ background:transparent; color:var(--mid); border:1.5px solid var(--border); }
.btn-ghost:hover{ border-color:var(--morado); color:var(--morado); }
.btn-sm{ padding:.38rem .85rem; font-size:.77rem; }
.btn-danger{ background:#fef2f2; color:var(--err); border:1.5px solid #fecaca; }
.btn-danger:hover{ background:var(--err); color:#fff; }

/* lista */
.lista{ display:flex; flex-direction:column; gap:.7rem; }

/* row de formulario */
.frow{
  background:var(--card); border:1.5px solid var(--border); border-radius:18px;
  display:grid; grid-template-columns:auto 1fr auto;
  align-items:center; gap:0; overflow:hidden;
  cursor:pointer; transition:all .2s;
}
.frow:hover{ border-color:var(--morado); box-shadow:0 8px 28px rgba(166,127,255,.14); transform:translateX(4px); }

.frow-tipo{
  width:72px; align-self:stretch;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:.8rem .4rem;
  font-size:1.6rem; line-height:1;
  border-right:1px solid var(--border);
}
.frow-tipo small{ font-size:.6rem; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:.06em; margin-top:.3rem; }

.frow-body{ padding:.85rem 1.1rem; min-width:0; }
.frow-nombre{ font-family:'Fraunces',serif; font-size:1rem; font-weight:700; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.frow-meta{ display:flex; flex-wrap:wrap; gap:.2rem .8rem; font-size:.78rem; color:var(--mid); margin-top:.22rem; }
.frow-meta span{ display:flex; align-items:center; gap:.28rem; }
.frow-servicio{
  display:inline-flex; align-items:center; gap:.3rem;
  background:var(--mp); color:var(--morado);
  padding:.13rem .65rem; border-radius:50px; font-size:.7rem; font-weight:700;
  margin-top:.35rem;
}
.frow-motivo{ font-size:.78rem; color:var(--mid); margin-top:.3rem; line-height:1.5; }

.frow-right{ padding:.85rem 1.1rem; display:flex; flex-direction:column; align-items:flex-end; gap:.4rem; }
.frow-ts{ font-size:.68rem; color:var(--mid); font-family:var(--mono); white-space:nowrap; }
.badge-tipo{
  display:inline-flex; align-items:center; gap:.25rem;
  padding:.18rem .7rem; border-radius:50px; font-size:.68rem; font-weight:700;
}
.bt-cita  { background:#FFF3E0; color:#E65100; }
.bt-emp   { background:#E3F2FD; color:#1565C0; }
.bt-esc   { background:#F3E5F5; color:#6A1B9A; }
.frow-arrow{ font-size:.85rem; color:var(--morado); font-weight:700; }

/* empty */
.empty{ text-align:center; padding:4rem 1rem; color:var(--mid); }
.empty-ico{ font-size:3.5rem; opacity:.25; margin-bottom:.8rem; }
.empty p{ font-size:.9rem; }

/* spinner */
.spinner-wrap{ display:flex; align-items:center; justify-content:center; padding:4rem; }
.spinner{ width:38px; height:38px; border:3px solid var(--mp); border-top-color:var(--morado); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin{ to{transform:rotate(360deg);} }

/* ══════════════════
   MODAL DETALLE
══════════════════ */
.overlay{ display:none; position:fixed; inset:0; z-index:5000; background:rgba(15,10,30,.9); backdrop-filter:blur(12px); align-items:flex-start; justify-content:center; padding:1.5rem 1rem; overflow-y:auto; }
.overlay.show{ display:flex; }
.om{
  background:var(--card); border-radius:24px;
  width:680px; max-width:100%; margin:auto;
  box-shadow:0 40px 80px rgba(0,0,0,.4);
  animation:omIn .32s cubic-bezier(.16,1,.3,1);
  position:relative; overflow:hidden;
}
@keyframes omIn{ from{opacity:0;transform:scale(.93) translateY(24px);} to{opacity:1;transform:none;} }

.om-stripe{
  height:6px;
  background:linear-gradient(90deg,var(--rosa),var(--morado));
}
.om-stripe.t-cita { background:linear-gradient(90deg,#FF6B35,#F7C59F); }
.om-stripe.t-emp  { background:linear-gradient(90deg,#1565C0,#42A5F5); }
.om-stripe.t-esc  { background:linear-gradient(90deg,#6A1B9A,#CE93D8); }

.om-head{
  padding:1.3rem 1.6rem .9rem;
  display:flex; align-items:flex-start; justify-content:space-between; gap:.8rem;
  border-bottom:1px solid var(--border);
}
.om-head-l{ flex:1; min-width:0; }
.om-tipo-badge{
  display:inline-flex; align-items:center; gap:.3rem;
  padding:.2rem .75rem; border-radius:50px; font-size:.7rem; font-weight:700; margin-bottom:.4rem;
}
.om-nombre{ font-family:'Fraunces',serif; font-size:1.3rem; font-weight:900; letter-spacing:-.02em; line-height:1.2; }
.om-id{ font-family:var(--mono); font-size:.65rem; color:var(--mid); margin-top:.2rem; }
.om-close{
  background:var(--bg); border:none; border-radius:50%;
  width:34px; height:34px; display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; cursor:pointer; color:var(--mid); flex-shrink:0; transition:all .15s;
}
.om-close:hover{ background:var(--border); }

.om-body{ padding:1.3rem 1.6rem; }

/* grid de datos */
.data-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:.5rem .9rem;
  background:linear-gradient(135deg,var(--rp),var(--mp));
  border-radius:14px; padding:1rem 1.1rem; margin-bottom:1.2rem;
}
.data-grid.cols3{ grid-template-columns:1fr 1fr 1fr; }
.dg-item{}
.dg-label{ font-size:.62rem; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.18rem; }
.dg-val{ font-size:.87rem; font-weight:600; color:var(--text); word-break:break-word; }
.dg-val a{ color:var(--morado); text-decoration:none; }
.dg-val a:hover{ text-decoration:underline; }
.dg-full{ grid-column:1/-1; }

.om-section{ font-size:.68rem; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:.1em; margin:.9rem 0 .55rem; display:flex; align-items:center; gap:.5rem; }
.om-section::after{ content:''; flex:1; height:1px; background:var(--border); }

/* slots */
.slots-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:.5rem; max-height:200px; overflow-y:auto; margin-bottom:1.1rem; padding-right:2px;
}
.slot{
  background:linear-gradient(135deg,var(--rp),var(--mp));
  border:1.5px solid var(--border); border-radius:14px;
  padding:.65rem .5rem; text-align:center; cursor:pointer; transition:all .2s;
}
.slot:hover,.slot.sel{
  background:linear-gradient(135deg,var(--rosa),var(--morado));
  border-color:transparent; color:#fff;
}
.slot:hover .sd,.slot.sel .sd,
.slot:hover .sm,.slot.sel .sm,
.slot:hover .sh,.slot.sel .sh{ color:#fff!important; }
.sn{ font-family:'Fraunces',serif; font-size:1.25rem; font-weight:900; line-height:1.1; }
.sd{ font-size:.58rem; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:.07em; }
.sm{ font-size:.6rem; color:var(--mid); }
.sh{ font-size:.68rem; font-weight:700; color:var(--morado); margin-top:.25rem; }
.slot-load{ text-align:center; padding:1.5rem; color:var(--mid); font-size:.83rem; }
.slot-spin-w{ width:24px; height:24px; border:2.5px solid var(--mp); border-top-color:var(--morado); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto .5rem; }
.no-slots{ text-align:center; padding:1.2rem; color:var(--mid); font-size:.82rem; background:var(--bg); border-radius:12px; }

/* notificaciones */
.notif-box{ background:var(--bg); border:1.5px solid var(--border); border-radius:14px; padding:.95rem 1.1rem; margin-bottom:1.1rem; }
.notif-lbl{ font-size:.65rem; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.65rem; }
.ncheck{ display:flex; align-items:flex-start; gap:.65rem; cursor:pointer; margin-bottom:.5rem; }
.ncheck input{ width:16px; height:16px; margin-top:2px; accent-color:var(--morado); flex-shrink:0; }
.ncheck-txt strong{ display:block; font-size:.82rem; font-weight:600; }
.ncheck-txt small{ font-size:.7rem; color:var(--mid); }
.notif-msg{
  width:100%; margin-top:.5rem; padding:.62rem .88rem;
  border:1.5px solid var(--border); border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:.82rem; color:var(--text);
  background:#fff; resize:vertical; min-height:64px; outline:none; transition:border .2s;
}
.notif-msg:focus{ border-color:var(--morado); }

.om-actions{ display:flex; gap:.65rem; padding:0 1.6rem 1.6rem; }
.om-actions .btn{ flex:1; justify-content:center; }

/* toasts */
.toasts{ position:fixed; bottom:1.5rem; right:1.5rem; display:flex; flex-direction:column; gap:.5rem; z-index:9999; pointer-events:none; }
.toast{ background:#1E1830; color:#fff; padding:.78rem 1.2rem; border-radius:12px; font-size:.83rem; font-weight:600; max-width:300px; box-shadow:0 8px 28px rgba(0,0,0,.35); animation:toastIn .3s ease; pointer-events:auto; }
@keyframes toastIn{ from{opacity:0;transform:translateX(50px);} to{opacity:1;transform:none;} }

@media(max-width:640px){
  .frow{ grid-template-columns:56px 1fr; }
  .frow-right{ display:none; }
  .data-grid,.data-grid.cols3{ grid-template-columns:1fr; }
  .counters{ display:grid; grid-template-columns:1fr 1fr; }
  .tipo-tabs{ flex-wrap:wrap; }
  .om-body{ padding:1rem; }
  .om-actions{ padding:0 1rem 1rem; }
  .om-head{ padding:1rem; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="ln-blobs"><div class="ln-blob"></div><div class="ln-blob"></div></div>
  <div class="ln-card">
    <div class="ln-logo">📋</div>
    <div class="ln-title">Formularios Pendientes</div>
    <div class="ln-sub">Bienestar Emocional · Acceso restringido</div>
    <div class="ln-field">
      <label class="ln-label">Usuario</label>
      <div class="ln-inp-w">
        <span class="ln-ico">👤</span>
        <input class="ln-inp" type="text" id="lu" placeholder="usuario" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
      </div>
    </div>
    <div class="ln-field">
      <label class="ln-label">Contraseña</label>
      <div class="ln-inp-w">
        <span class="ln-ico">🔒</span>
        <input class="ln-inp" type="password" id="lp" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
        <button class="ln-eye" onclick="togglePwd()">👁</button>
      </div>
    </div>
    <button class="ln-btn" id="lbtn" onclick="login()">Entrar</button>
    <div class="ln-err" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-l">
      <div class="tb-dot">📋</div>
      <div class="tb-title">Pendientes <span>Bienestar Emocional</span></div>
    </div>
    <div class="tb-r">
      <div class="tb-chip">
        <div class="tb-av" id="uav">A</div>
        <span class="tb-uname" id="uname">—</span>
      </div>
      <button class="btn btn-danger btn-sm" onclick="logout()">🚪 Salir</button>
    </div>
  </div>

  <div class="main">
    <div class="sec-header">
      <div class="sec-title">Formularios <span>pendientes</span></div>
      <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;">
        <div class="counters" id="counters">
          <div class="counter on" data-tipo="todos" onclick="setTipo('todos',this)"><span class="n" id="ct-total">0</span> Todos</div>
          <div class="counter" data-tipo="cita"    onclick="setTipo('cita',this)">🧑 <span class="n" id="ct-cita">0</span> Citas</div>
          <div class="counter" data-tipo="empresa" onclick="setTipo('empresa',this)">🏢 <span class="n" id="ct-emp">0</span> Empresas</div>
          <div class="counter" data-tipo="escuela" onclick="setTipo('escuela',this)">🏫 <span class="n" id="ct-esc">0</span> Escuelas</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="cargar()">↺ Actualizar</button>
      </div>
    </div>

    <div class="toolbar">
      <div class="srch-w">
        <span class="srch-ico">🔍</span>
        <input type="text" id="buscar" placeholder="Buscar nombre, teléfono, empresa…" oninput="renderLista()">
      </div>
    </div>

    <div id="lista-wrap"></div>
  </div>
</div>

<!-- MODAL DETALLE + AGENDA -->
<div class="overlay" id="overlay">
  <div class="om">
    <div class="om-stripe" id="om-stripe"></div>
    <div class="om-head">
      <div class="om-head-l">
        <div class="om-tipo-badge" id="om-tbadge"></div>
        <div class="om-nombre" id="om-nombre"></div>
        <div class="om-id" id="om-id"></div>
      </div>
      <button class="om-close" onclick="cerrar()">✕</button>
    </div>
    <div class="om-body">
      <!-- datos del formulario -->
      <div id="om-data-grid"></div>

      <!-- selector de slot -->
      <div class="om-section">📅 Selecciona un horario disponible</div>
      <div id="slots-wrap"></div>

      <!-- notificaciones -->
      <div class="om-section">📤 Notificaciones a enviar</div>
      <div class="notif-box">
        <div class="notif-lbl">Canales</div>
        <label class="ncheck">
          <input type="checkbox" id="n-wa" checked>
          <div class="ncheck-txt"><strong>WhatsApp al solicitante</strong><small>Abre wa.me con mensaje prellenado</small></div>
        </label>
        <label class="ncheck">
          <input type="checkbox" id="n-email" checked>
          <div class="ncheck-txt"><strong>Correo al solicitante</strong><small>Vía Apps Script — requiere correo registrado</small></div>
        </label>
        <label class="ncheck">
          <input type="checkbox" id="n-admin" checked>
          <div class="ncheck-txt"><strong>Notificación admin (WhatsApp)</strong><small>Resumen de la cita confirmada</small></div>
        </label>
        <textarea class="notif-msg" id="n-msg" placeholder="Mensaje adicional al solicitante (opcional)…"></textarea>
      </div>
    </div>
    <div class="om-actions">
      <button class="btn btn-ghost" onclick="cerrar()">Cancelar</button>
      <button class="btn btn-primary" id="btn-conf" onclick="confirmar()" disabled>📨 Confirmar y notificar</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
'use strict';

/* ─── CONFIG ─── */
var PROXY    = 'https://script.google.com/macros/s/AKfycbz-_1X-c3aZ2lJ4N6m3R5tP2l2cznIs7Seuvkb5X5J1oPVrIXDwkEHi936b4dXg5JxO/exec';
var WA_ADMIN = '524425839311';
var DIAS     = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
var MESES    = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var INACT_MS = 25 * 60 * 1000;

/* ─── Estado ─── */
var currentUser    = null;
var formularios    = [];   // todos los registros pendientes de las 3 hojas
var tipoActivo     = 'todos';
var registroActual = null;
var slotActual     = null;
var slotsCache     = null;
var inactTimer     = null;

/* ─── API ─── */
function apiGet(tab) {
  return fetch(PROXY + '?tab=' + encodeURIComponent(tab), { redirect: 'follow' })
    .then(r => r.text())
    .then(t => { var j = JSON.parse(t); if (!j.ok) throw new Error(j.error || 'Error'); return j; });
}
function apiPost(action, payload) {
  return fetch(PROXY, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(Object.assign({ action }, payload))
  }).then(r => r.text())
    .then(t => { var j = JSON.parse(t); if (!j.ok) throw new Error(j.error || 'Error'); return j; });
}

/* ─── LOGIN ─── */
function login() {
  var lu = q('lu').value.trim(), lp = q('lp').value;
  var btn = q('lbtn');
  if (!lu || !lp) { showErr('Completa usuario y contraseña.'); return; }
  btn.disabled = true; btn.textContent = '⏳ Verificando…';

  apiGet('Usuarios').then(j => {
    var d = j.data || {}, users = [], i = 1;
    while (d['login_' + i] !== undefined) {
      if (d['login_' + i]) users.push({
        login: d['login_'+i], pass: d['pass_'+i],
        nombre: d['nombre_'+i], activo: d['activo_'+i]
      });
      i++;
    }
    var u = users.find(u => u.login === lu && u.pass === lp && u.activo === 'true');
    if (u) {
      currentUser = u;
      sessionStorage.setItem('be_pend', JSON.stringify({ login: u.login, nombre: u.nombre, ts: Date.now() }));
      iniciarApp(u);
    } else {
      showErr('Usuario o contraseña incorrectos.');
      btn.disabled = false; btn.textContent = 'Entrar';
      ['lu','lp'].forEach(id => { q(id).classList.add('bad'); setTimeout(()=>q(id).classList.remove('bad'),600); });
    }
  }).catch(e => {
    showErr('Error de conexión: ' + e.message);
    btn.disabled = false; btn.textContent = 'Entrar';
  });
}

function iniciarApp(u) {
  q('login').classList.add('gone');
  q('app').classList.add('on');
  q('uav').textContent   = u.nombre.charAt(0).toUpperCase();
  q('uname').textContent = u.nombre;
  document.addEventListener('mousemove', resetInact);
  document.addEventListener('keydown', resetInact);
  resetInact();
  cargar();
}

function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  clearTimeout(inactTimer);
  sessionStorage.removeItem('be_pend');
  currentUser = null;
  q('login').classList.remove('gone');
  q('app').classList.remove('on');
  q('lbtn').disabled = false; q('lbtn').textContent = 'Entrar';
  q('lu').value = ''; q('lp').value = '';
}

function resetInact() {
  clearTimeout(inactTimer);
  inactTimer = setTimeout(() => { toast('Sesión cerrada por inactividad','warn'); logout(); }, INACT_MS);
}
function showErr(m) { var e=q('lerr'); e.textContent=m; e.classList.remove('show'); void e.offsetWidth; e.classList.add('show'); }
function togglePwd() { var i=q('lp'); i.type=i.type==='password'?'text':'password'; }

// Restaurar sesión
(function(){
  try {
    var s = JSON.parse(sessionStorage.getItem('be_pend'));
    if (s && (Date.now()-s.ts) < INACT_MS) { currentUser={login:s.login,nombre:s.nombre}; iniciarApp(currentUser); }
  } catch(e){}
})();

/* ─────────────────────────────────────────────────
   CARGA — lee las 3 hojas y unifica en formularios[]
───────────────────────────────────────────────── */
function cargar() {
  q('lista-wrap').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';
  formularios = [];

  var tabs = [
    { tab:'Citas_Personales',      tipo:'cita' },
    { tab:'Cotizaciones_Empresas', tipo:'empresa' },
    { tab:'Cotizaciones_Escuelas', tipo:'escuela' }
  ];

  Promise.all(tabs.map(t =>
    apiGet(t.tab).then(j => ({ tipo: t.tipo, tab: t.tab, data: j.data })).catch(() => null)
  )).then(results => {
    results.forEach(res => { if (res) parsearHoja(res.tipo, res.tab, res.data); });
    // ordenar: más recientes primero
    formularios.sort((a,b) => new Date(b.timestamp||0) - new Date(a.timestamp||0));
    actualizarContadores();
    renderLista();
  });
}

/*
  La proxy retorna datos como objeto plano con sufijos _N
  (igual que el resto del sistema).
  Columnas de cada hoja:
    Citas_Personales:      Timestamp, ID_Contacto, Nombre, Telefono, Correo, Tipo_Terapia, Tipo_Paciente, Motivo, Estado
    Cotizaciones_Empresas: Timestamp, ID_Contacto, Nombre_Empresa, Giro, Nombre_Contacto, Cargo, Telefono, Correo, Servicio, Num_Colaboradores, Motivo_Atencion, ... Estado (col 20)
    Cotizaciones_Escuelas: Timestamp, ID_Contacto, Nombre_Escuela, Nivel_Educativo, Nombre_Contacto, Cargo, Telefono, Correo, Servicio, Poblacion, Num_Alumnos, ... Estado (col 22)
*/
function parsearHoja(tipo, tab, data) {
  if (!data) return;
  var i = 1;
  while (data['timestamp_' + i] !== undefined || data['id_contacto_' + i] !== undefined) {
    var r = extraerFila(data, i);
    if (!r) { i++; continue; }

    var estado = (r.estado || '').trim();
    // Solo los que están en estado Pendiente
    if (estado !== 'Pendiente') { i++; continue; }

    var obj = {
      _tab:      tab,
      _rowIndex: i,
      tipo:      tipo,
      timestamp: r.timestamp || '',
      idContacto: r.id_contacto || '',
      estado:    estado
    };

    if (tipo === 'cita') {
      obj.nombre    = r.nombre || '';
      obj.telefono  = r.telefono || '';
      obj.correo    = r.correo || '';
      obj.servicio  = r.tipo_terapia || '';
      obj.subtipo   = r.tipo_paciente || '';
      obj.motivo    = r.motivo || '';
      obj._extras   = [
        { l:'Tipo de terapia',  v: r.tipo_terapia  || '—' },
        { l:'Tipo de paciente', v: r.tipo_paciente || '—' },
        { l:'Motivo',           v: r.motivo        || '—' }
      ];
    } else if (tipo === 'empresa') {
      obj.nombre    = r.nombre_contacto || r.nombre_empresa || '';
      obj.entidad   = r.nombre_empresa  || '';
      obj.telefono  = r.telefono || '';
      obj.correo    = r.correo   || '';
      obj.servicio  = r.servicio || '';
      obj.motivo    = r.motivo_atencion || r.comentarios || '';
      obj._extras   = [
        { l:'Empresa',            v: r.nombre_empresa     || '—' },
        { l:'Giro',               v: r.giro               || '—' },
        { l:'Cargo',              v: r.cargo              || '—' },
        { l:'No. colaboradores',  v: r.num_colaboradores  || '—' },
        { l:'Modalidad',          v: r.modalidad_atencion || '—' },
        { l:'Motivo / Comentario',v: r.motivo_atencion || r.comentarios || '—', full:true }
      ];
    } else if (tipo === 'escuela') {
      obj.nombre    = r.nombre_contacto || r.nombre_escuela || '';
      obj.entidad   = r.nombre_escuela  || '';
      obj.telefono  = r.telefono || '';
      obj.correo    = r.correo   || '';
      obj.servicio  = r.servicio || '';
      obj.motivo    = r.motivo_principal || r.comentarios || '';
      obj._extras   = [
        { l:'Escuela',          v: r.nombre_escuela    || '—' },
        { l:'Nivel educativo',  v: r.nivel_educativo   || '—' },
        { l:'Cargo',            v: r.cargo             || '—' },
        { l:'Población',        v: r.poblacion         || '—' },
        { l:'No. alumnos',      v: r.num_alumnos       || '—' },
        { l:'Motivo / Comentario', v: r.motivo_principal||r.comentarios||'—', full:true }
      ];
    }

    formularios.push(obj);
    i++;
  }
}

// Extrae una fila como objeto con claves normalizadas
function extraerFila(data, i) {
  var obj = {};
  var found = false;
  for (var k in data) {
    if (!k.endsWith('_' + i)) continue;
    var key = k.slice(0, k.length - ('_'+i).length).toLowerCase();
    obj[key] = String(data[k] || '');
    found = true;
  }
  return found ? obj : null;
}

/* ─── Contadores ─── */
function actualizarContadores() {
  setText('ct-total', formularios.length);
  setText('ct-cita',  formularios.filter(f=>f.tipo==='cita').length);
  setText('ct-emp',   formularios.filter(f=>f.tipo==='empresa').length);
  setText('ct-esc',   formularios.filter(f=>f.tipo==='escuela').length);
}

function setTipo(val, el) {
  tipoActivo = val;
  document.querySelectorAll('.counter').forEach(c=>c.classList.remove('on'));
  if (el) el.classList.add('on');
  renderLista();
}

/* ─── Render lista ─── */
function renderLista() {
  var q2 = q('buscar').value.trim().toLowerCase();
  var lista = formularios.filter(f => {
    if (tipoActivo !== 'todos' && f.tipo !== tipoActivo) return false;
    if (!q2) return true;
    return (f.nombre+f.telefono+f.correo+f.servicio+f.motivo+(f.entidad||'')).toLowerCase().includes(q2);
  });

  if (!lista.length) {
    q('lista-wrap').innerHTML = '<div class="empty"><div class="empty-ico">📭</div><p>' + (formularios.length ? 'No hay resultados para la búsqueda.' : 'No hay formularios pendientes.') + '</p></div>';
    return;
  }

  var tipoInfo = {
    cita:    { emoji:'🧑', label:'Cita personal',   cls:'bt-cita',  stripe:'t-cita' },
    empresa: { emoji:'🏢', label:'Empresa',         cls:'bt-emp',   stripe:'t-emp' },
    escuela: { emoji:'🏫', label:'Escuela',         cls:'bt-esc',   stripe:'t-esc' }
  };

  q('lista-wrap').innerHTML = '<div class="lista">' + lista.map((f, idx) => {
    var ti = tipoInfo[f.tipo] || { emoji:'📋', label:f.tipo, cls:'bt-cita', stripe:'t-cita' };
    var ts = f.timestamp ? fmtFecha(f.timestamp) : '—';
    var ent = f.entidad ? '<br>🏢 <strong>' + esc(f.entidad) + '</strong>' : '';
    return '<div class="frow" onclick="abrirDetalle(' + idx + '_real_idx_' + ')">'
      .replace('_real_idx_', String(formularios.indexOf(f)))
      + '<div class="frow-tipo">' + ti.emoji + '<small>' + ti.label + '</small></div>'
      + '<div class="frow-body">'
      +   '<div class="frow-nombre">' + esc(f.nombre) + '</div>'
      +   '<div class="frow-meta">'
      +     '<span>📱 ' + esc(f.telefono) + '</span>'
      +     (f.correo ? '<span>📧 ' + esc(f.correo) + '</span>' : '')
      +   '</div>'
      +   ent
      +   (f.servicio ? '<div class="frow-servicio">🏷️ ' + esc(f.servicio) + '</div>' : '')
      +   (f.motivo ? '<div class="frow-motivo">📝 ' + esc(f.motivo.substring(0,100)) + (f.motivo.length>100?'…':'') + '</div>' : '')
      + '</div>'
      + '<div class="frow-right">'
      +   '<span class="frow-ts">' + ts + '</span>'
      +   '<span class="badge-tipo ' + ti.cls + '">' + ti.emoji + ' ' + ti.label + '</span>'
      +   '<span class="frow-arrow">Ver →</span>'
      + '</div>'
      + '</div>';
  }).join('') + '</div>';
}

/* ─── Abrir detalle ─── */
function abrirDetalle(idx) {
  var f = formularios[idx];
  if (!f) return;
  registroActual = f;
  slotActual = null;

  var tipoInfo = {
    cita:    { emoji:'🧑', label:'Cita personal',   cls:'bt-cita',  stripe:'t-cita' },
    empresa: { emoji:'🏢', label:'Empresa',         cls:'bt-emp',   stripe:'t-emp' },
    escuela: { emoji:'🏫', label:'Escuela',         cls:'bt-esc',   stripe:'t-esc' }
  };
  var ti = tipoInfo[f.tipo] || tipoInfo.cita;

  // Stripe
  q('om-stripe').className = 'om-stripe ' + ti.stripe;

  // Badge tipo
  q('om-tbadge').textContent = ti.emoji + ' ' + ti.label;
  q('om-tbadge').className   = 'om-tipo-badge ' + ti.cls;

  // Nombre e ID
  setText('om-nombre', f.nombre);
  setText('om-id',     f.idContacto ? '🪪 ' + f.idContacto : '');

  // Grid de datos
  var campos = [
    { l:'Teléfono', v: f.telefono || '—' },
    { l:'Correo',   v: f.correo   || '—' }
  ].concat(f._extras || []);

  var gridCols = campos.length >= 4 ? 'data-grid cols3' : 'data-grid';
  q('om-data-grid').innerHTML = '<div class="' + gridCols + '">'
    + campos.map(c => '<div class="dg-item' + (c.full?' dg-full':'') + '">'
      + '<div class="dg-label">' + esc(c.l) + '</div>'
      + '<div class="dg-val">' + esc(c.v) + '</div>'
      + '</div>').join('')
    + '</div>';

  // Mensaje sugerido
  q('n-msg').value = 'Hola ' + f.nombre.split(' ')[0] + ', hemos recibido tu solicitud'
    + (f.servicio ? ' de ' + f.servicio : '') + '. En breve te confirmamos tu cita. ¡Gracias! 💜';

  q('btn-conf').disabled = true;
  q('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';

  cargarSlots();
}

function cerrar() {
  q('overlay').classList.remove('show');
  document.body.style.overflow = '';
  registroActual = null; slotActual = null;
}

/* ─── Slots ─── */
function cargarSlots() {
  var c = q('slots-wrap');
  c.innerHTML = '<div class="slot-load"><div class="slot-spin-w"></div>Cargando disponibilidad…</div>';

  if (slotsCache && (Date.now() - slotsCache.ts) < 90000) { renderSlots(slotsCache.slots); return; }

  apiGet('Disponibilidad').then(j => {
    var data  = j.data || {};
    var slots = [], k = 1, hoy = new Date(); hoy.setHours(0,0,0,0);
    while (data['fecha_'+k] !== undefined) {
      var fechaStr = data['fecha_'+k] || '';
      var estado   = String(data['estado_'+k] || data['activo_'+k] || '').toLowerCase();
      if (fechaStr && estado !== 'ocupado' && estado !== 'false') {
        var fobj = new Date(fechaStr + 'T12:00:00');
        if (fobj >= hoy) slots.push({
          rowIndex:    k,
          fecha:       fechaStr,
          hora_inicio: data['hora_inicio_'+k] || '',
          hora_fin:    data['hora_fin_'+k]    || '',
          nota:        data['nota_'+k]        || ''
        });
      }
      k++;
    }
    slotsCache = { slots, ts: Date.now() };
    renderSlots(slots);
  }).catch(e => {
    c.innerHTML = '<div class="no-slots">⚠️ No se pudo cargar disponibilidad.<br><small>' + esc(e.message) + '</small></div>';
  });
}

function renderSlots(slots) {
  var c = q('slots-wrap');
  if (!slots.length) { c.innerHTML = '<div class="no-slots">📭 No hay horarios disponibles próximamente.</div>'; return; }
  c.innerHTML = '<div class="slots-grid">'
    + slots.map((s,i) => {
        var f = new Date(s.fecha + 'T12:00:00');
        return '<div class="slot" id="sl'+i+'" onclick="selSlot('+i+')">'
          + '<div class="sd">' + (DIAS[f.getDay()]||'—') + '</div>'
          + '<div class="sn">' + f.getDate() + '</div>'
          + '<div class="sm">' + (MESES[f.getMonth()]||'—') + '</div>'
          + (s.hora_inicio ? '<div class="sh">' + esc(s.hora_inicio) + (s.hora_fin?'–'+esc(s.hora_fin):'') + '</div>' : '')
          + '</div>';
      }).join('')
    + '</div>';
  c._slots = slots;
}

function selSlot(i) {
  var c = q('slots-wrap');
  var slots = c._slots || (slotsCache ? slotsCache.slots : []);
  slotActual = slots[i] || null;
  c.querySelectorAll('.slot').forEach(el => el.classList.remove('sel'));
  var el = c.querySelector('#sl'+i); if (el) el.classList.add('sel');
  q('btn-conf').disabled = !slotActual;
}

/* ─── Confirmar ─── */
function confirmar() {
  if (!registroActual || !slotActual) return;
  var btn = q('btn-conf');
  btn.disabled = true; btn.textContent = '⏳ Enviando…';

  var f = registroActual, s = slotActual;
  var msgExtra  = q('n-msg').value.trim();
  var envWA     = q('n-wa').checked;
  var envEmail  = q('n-email').checked;
  var envAdmin  = q('n-admin').checked;
  var fobj      = new Date(s.fecha + 'T12:00:00');
  var fechaLeg  = (DIAS[fobj.getDay()]||'') + ' ' + fobj.getDate() + ' de ' + (MESES[fobj.getMonth()]||'');
  var horaLeg   = s.hora_inicio + (s.hora_fin ? ' – ' + s.hora_fin : '');

  // 1. Marcar fila en la hoja original como "En espera"
  var p1 = apiPost('marcarFormularioAtendido', {
    tab:      f._tab,
    rowIndex: f._rowIndex,
    estado:   'En espera',
    fechaCita: s.fecha,
    horaCita:  s.hora_inicio
  });

  // 2. Marcar slot como ocupado
  var p2 = apiPost('marcarSlotOcupado', {
    rowIndex:       s.rowIndex,
    reservadoPara:  f.nombre + (f.idContacto ? ' — '+f.idContacto : '')
  });

  // 3. Correo al solicitante
  var p3 = (envEmail && f.correo)
    ? apiPost('enviarCorreoFormulario', { data: {
        nombre: f.nombre, telefono: f.telefono, correo: f.correo,
        servicio: f.servicio || '', fecha: s.fecha,
        hora_inicio: s.hora_inicio, hora_fin: s.hora_fin || '',
        motivo: f.motivo || '', mensaje_extra: msgExtra
      }}).catch(() => {})
    : Promise.resolve();

  Promise.all([p1, p2, p3]).then(() => {
    // WhatsApp al solicitante
    if (envWA && f.telefono) {
      var tel = f.telefono.replace(/\D/g,'');
      if (tel.length === 10) tel = '52' + tel;
      var msgCli = '¡Hola ' + f.nombre.split(' ')[0] + '! 💜\n\n'
        + 'Recibimos tu solicitud' + (f.servicio ? ' de *' + f.servicio + '*' : '') + '.\n'
        + '📅 Fecha tentativa: *' + fechaLeg + '*\n'
        + '🕐 Horario: *' + horaLeg + '*\n\n'
        + (msgExtra ? msgExtra + '\n\n' : '')
        + 'En breve te confirmamos. ¡Gracias! 🌿';
      window.open('https://wa.me/' + tel + '?text=' + encodeURIComponent(msgCli), '_blank');
    }

    // WhatsApp admin
    if (envAdmin) {
      var msgAdm = '📋 *CITA EN ESPERA*\n\n'
        + '👤 *Nombre:* ' + f.nombre    + '\n'
        + '📱 *Tel:* '    + f.telefono  + '\n'
        + (f.correo   ? '📧 *Correo:* '  + f.correo          + '\n' : '')
        + (f.entidad  ? '🏢 *Entidad:* ' + f.entidad          + '\n' : '')
        + '🏷️ *Servicio:* ' + (f.servicio||'—')              + '\n'
        + '📅 *Fecha:* '    + fechaLeg                        + '\n'
        + '🕐 *Hora:* '     + horaLeg;
      window.open('https://wa.me/' + WA_ADMIN + '?text=' + encodeURIComponent(msgAdm), '_blank');
    }

    // Quitar de la lista local (ya no está Pendiente)
    formularios.splice(formularios.indexOf(f), 1);
    slotsCache = null;
    actualizarContadores();
    renderLista();
    cerrar();
    toast('✅ Notificaciones enviadas — formulario marcado como En espera', 'ok');

  }).catch(e => {
    btn.disabled = false; btn.textContent = '📨 Confirmar y notificar';
    toast('Error: ' + e.message, 'err');
  });
}

/* ─── Utils ─── */
function q(id) { return document.getElementById(id); }
function setText(id, v) { var e=q(id); if(e) e.textContent=String(v!=null?v:''); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtFecha(s) {
  try { return new Date(s).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch(e){ return s; }
}
function toast(msg, type) {
  var c=q('toasts'), t=document.createElement('div');
  t.className='toast'; t.style.borderLeft='3px solid '+({ok:'#22C55E',err:'#EF4444',warn:'#F59E0B'}[type]||'#A67FFF');
  t.textContent=msg; c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(50px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),350); },3500);
}

document.addEventListener('keydown', e => { if(e.key==='Escape') cerrar(); });
q('overlay').addEventListener('click', e => { if(e.target===q('overlay')) cerrar(); });
</script>
